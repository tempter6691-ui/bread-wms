<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
:root{
  --primary:#18181b;
  --accent:#2563eb;
  --accent-light:#eff6ff;
  --success:#16a34a;
  --danger:#dc2626;
  --warning:#d97706;
  --bg:#f9fafb;
  --surface:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --sub:#6b7280;
  --sidebar:#18181b;
  --sidebar-hover:#27272a;
  --sidebar-active:#3f3f46;
  --radius:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
#app{display:flex;height:100vh;overflow:hidden;}

/* 사이드바 */
#sidebar{width:210px;background:var(--sidebar);color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
#sidebar-header{padding:1.2rem 1rem 1rem;border-bottom:1px solid #27272a;}
#sidebar-header .logo{font-size:1.25rem;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1;}
#sidebar-header .logo-sub{font-size:.7rem;color:#71717a;margin-top:3px;letter-spacing:.5px;text-transform:uppercase;}
.nav-section{padding:.8rem 1rem .3rem;font-size:.65rem;color:#52525b;text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.55rem 1rem;cursor:pointer;font-size:.82rem;color:#a1a1aa;transition:all .15s;border-radius:0;margin:1px 0;}
.nav-item:hover{background:var(--sidebar-hover);color:#fff;}
.nav-item.active{background:var(--sidebar-active);color:#fff;}
.nav-item .nav-icon{font-size:1rem;width:20px;text-align:center;}
#sidebar-footer{padding:.75rem;border-top:1px solid #27272a;margin-top:auto;}

/* 메인 */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#topbar{background:var(--surface);padding:.7rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;}
#page-title{font-weight:600;font-size:.95rem;flex:1;color:var(--text);}
#content{flex:1;overflow-y:auto;padding:1.5rem;}

/* 카드 */
.card{background:var(--surface);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);margin-bottom:1rem;border:1px solid var(--border);}
.card-title{font-weight:600;margin-bottom:.9rem;color:var(--text);font-size:.92rem;}

/* 버튼 */
.btn{padding:.45rem .9rem;border:none;border-radius:6px;cursor:pointer;font-size:.82rem;font-family:inherit;font-weight:500;transition:all .15s;letter-spacing:-.1px;}
.btn:hover{filter:brightness(.93);}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-gray{background:#f4f4f5;color:#3f3f46;border:1px solid var(--border);}
.btn-sm{padding:.28rem .6rem;font-size:.75rem;}

/* 인풋 */
input,select,textarea{padding:.48rem .7rem;border:1px solid var(--border);border-radius:6px;font-size:.85rem;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.scan-input{width:100%;padding:.75rem;font-size:1rem;border:2px solid var(--accent);border-radius:8px;background:#fafcff;}

/* 테이블 */
table{width:100%;border-collapse:collapse;}
th,td{padding:.52rem .65rem;text-align:left;border-bottom:1px solid var(--border);font-size:.82rem;}
th{background:#f9fafb;font-weight:600;color:var(--sub);font-size:.75rem;text-transform:uppercase;letter-spacing:.4px;}
tr:hover td{background:#fafafa;}

/* 배지 */
.badge{padding:.18rem .55rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.bg-green{background:#dcfce7;color:#166534;}
.bg-red{background:#fee2e2;color:#991b1b;}
.bg-yellow{background:#fef9c3;color:#854d0e;}
.bg-blue{background:#dbeafe;color:#1e40af;}

/* 통계 카드 */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1rem;}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:1.1rem;box-shadow:var(--shadow);border:1px solid var(--border);transition:box-shadow .2s;}
.stat-card:hover{box-shadow:var(--shadow-md);}
.stat-num{font-size:1.8rem;font-weight:700;color:var(--text);letter-spacing:-1px;}
.stat-lbl{font-size:.72rem;color:var(--sub);margin-top:.2rem;font-weight:500;}

/* 드라이버 탭 */
.driver-tabs{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem;}
.dtab{padding:.32rem .72rem;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:.8rem;background:var(--surface);transition:all .15s;font-weight:500;}
.dtab:hover{border-color:var(--accent);color:var(--accent);}
.dtab.active{border-color:var(--accent);background:var(--accent);color:#fff;}

/* 거래처 버튼 */
.client-btn{padding:.32rem .65rem;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;font-size:.77rem;background:var(--surface);margin:.12rem;transition:all .15s;font-weight:400;}
.client-btn:hover{border-color:var(--accent);color:var(--accent);}
.client-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent);}

/* 상태 */
#fb-status{font-size:.7rem;padding:.2rem .5rem;border-radius:20px;font-weight:500;}
.fb-ok{background:#dcfce7;color:#166534;}
.fb-no{background:#fee2e2;color:#991b1b;}

/* 모달 */
#cfg-modal{display:none !important;}
.cfg-box{background:var(--surface);border-radius:14px;padding:2rem;max-width:520px;width:92%;box-shadow:var(--shadow-md);}
.cfg-box h2{margin-bottom:.75rem;font-size:1rem;}
.cfg-box textarea{width:100%;height:180px;margin:.75rem 0;font-family:monospace;font-size:.82rem;}
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border-radius:14px;padding:1.5rem;width:90%;max-width:540px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.modal-hdr{display:flex;align-items:center;margin-bottom:1rem;}
.modal-hdr h3{flex:1;font-size:.95rem;font-weight:600;}
.cls-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--sub);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.cls-btn:hover{background:var(--border);}

/* 토스트 */
#toast{position:fixed;top:1rem;right:1rem;z-index:9999;}
.ti{background:var(--text);color:#fff;padding:.6rem 1rem;border-radius:8px;margin-bottom:.4rem;font-size:.82rem;animation:tin .25s ease;box-shadow:var(--shadow-md);}
.ti-ok{background:var(--success);}
.ti-err{background:var(--danger);}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 모바일 */
#mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:500;}
.mob-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:.45rem .2rem;cursor:pointer;font-size:.58rem;color:var(--sub);font-weight:500;}
.mob-item.active{color:var(--accent);}
.mob-icon{font-size:1.2rem;}
.res-ok{background:#dcfce7;padding:.6rem;border-radius:6px;color:#166534;margin:.5rem 0;font-size:.85rem;}
.res-err{background:#fee2e2;padding:.6rem;border-radius:6px;color:#991b1b;margin:.5rem 0;font-size:.85rem;}

@media(max-width:760px){
  #sidebar{display:none;}
  #mob-nav{display:flex;}
  #content{padding:.75rem;padding-bottom:5rem;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  #topbar{padding:.6rem 1rem;}
}
</style>
</head>

  </div>
</div>
<div id="main">
  <div id="topbar">
    <div id="page-title">대시보드</div>

</div>

function saveConfig() {

  try {

async function loadAll() {

    else { S.prods = JSON.parse(JSON.stringify(PRODS_DEFAULT)); var b=db.batch(); S.prods.forEach(function(p){ b.set(db.collection('products').doc(p.id),{qr:p.qr,name:p.name,cat:p.cat}); }); await b.commit(); }

    var cs = await db.collection('clients').get();
    if (!cs.empty) { S.clients = []; cs.forEach(function(d){ S.clients.push(Object.assign({id:d.id},d.data())); }); }
    else { S.clients = JSON.parse(JSON.stringify(CLIENTS_DEFAULT)); var b2=db.batch(); S.clients.forEach(function(c){ b2.set(db.collection('clients').doc(c.id),{name:c.name,driver:c.driver||''}); }); await b2.commit(); }

    var iv = await db.collection('inventory').get();

// ── 실시간 리스너 ────────────────────────────────────────────
var _listeners = [];
var _writing = false; // 내가 쓰는 중일 때 리스너 무시 방지용

function startListeners() {
  // 기존 리스너 정리
  _listeners.forEach(function(unsub){ unsub(); });
  _listeners = [];

  // orders 컬렉션 실시간 감지
  var ordUnsub = db.collection('orders').onSnapshot(function(snap) {
    if(_writing) return; // 내가 쓰는 중이면 skip
    var changed = false;
    snap.docChanges().forEach(function(change) {
      var dateKey = change.doc.id;
      if(change.type === 'removed') {
        delete S.orders[dateKey];
        changed = true;
      } else {
        var newData = change.doc.data();
        // 현재 보고 있는 날짜가 바뀐 경우에만 화면 갱신
        S.orders[dateKey] = newData;
        if(dateKey === S.ordDate) changed = true;
      }
    });
    if(changed) {
      // 상단에 동기화 표시
      var el = document.getElementById('fb-status');
      if(el) { el.textContent = '● 동기화됨'; el.className = 'badge fb-ok'; }
      // 출고지시서나 출고 화면 보고 있으면 자동 갱신
      // 단, 검색창에 포커스가 있으면 입력 중이므로 포커스 빠질 때까지 대기
      if(S.page === 'orders' || S.page === 'outbound') {
        var focused = document.activeElement;
        var isTyping = focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA');
        if(isTyping) {
          // 포커스 빠지면 그때 갱신
          focused.addEventListener('blur', function onBlur() {
            focused.removeEventListener('blur', onBlur);
            if(S.page === 'orders' || S.page === 'outbound') render();
          });
        } else {
          render();
        }
      }
    }
  }, function(err) {
    console.warn('orders 리스너 오류:', err);
  });
  _listeners.push(ordUnsub);

  // inventory 컬렉션 실시간 감지
  var invUnsub = db.collection('inventory').onSnapshot(function(snap) {
    if(_writing) return;
    snap.docChanges().forEach(function(change) {
      if(change.type === 'removed') {
        delete S.inv[change.doc.id];
      } else {
        S.inv[change.doc.id] = change.doc.data().qty || 0;
      }
    });
    // 출고 화면이면 재고 수치 갱신
    if(S.page === 'outbound' && S.outClient) {
      var el = document.getElementById('ob-items');
      if(el) el.innerHTML = drawObItems();
    }
    if(S.page === 'stock') render();
  }, function(err) {
    console.warn('inventory 리스너 오류:', err);
  });
  _listeners.push(invUnsub);
}

      '<div class="stat-card" style="'+(zero>0?'border:2px solid #e74c3c':'')+'"><div class="stat-num" style="'+(zero>0?'color:#e74c3c':'')+'">'+zero+'</div><div class="stat-lbl">재고없음</div></div>'+
    '</div>'+
    '<div class="card"><div class="card-title">오늘 출고지시서 ('+S.ordDate+')</div>'+
    (cnt===0?'<p style="color:#aaa;">오늘 지시서 없음. <a href="#" onclick="go(\'orders\')">지시서 입력하기</a></p>':
      Object.keys(todayOrd).filter(function(n){
        return ((todayOrd[n]||{}).items||[]).length > 0;
      }).map(function(n){
        var items=(todayOrd[n]||{}).items||[];
        var totalKinds=items.length;
        var doneKinds=items.filter(function(i){return i.done;}).length;
        var panItems=items.filter(function(i){var p2=S.prods.find(function(x){return x.id===i.pid;}); return !p2||!p2.unit||p2.unit==='판'||p2.unit==='박스';});
        var bongItems=items.filter(function(i){var p2=S.prods.find(function(x){return x.id===i.pid;}); return p2&&p2.unit==='봉';});
        var geaItems=items.filter(function(i){var p2=S.prods.find(function(x){return x.id===i.pid;}); return p2&&p2.unit==='개';});


        var totalPan=panItems.reduce(function(s,i){return s+i.qty;},0);
        var scannedPan=panItems.reduce(function(s,i){return s+(i.scanned||0);},0);
        var totalBong=bongItems.reduce(function(s,i){return s+i.qty;},0);
        var scannedBong=bongItems.reduce(function(s,i){return s+(i.scanned||0);},0);
        var totalGea=geaItems.reduce(function(s,i){return s+i.qty;},0);
        var scannedGea=geaItems.reduce(function(s,i){return s+(i.scanned||0);},0);
        var allDone=totalKinds>0&&doneKinds===totalKinds;
        var badges='';
        if(allDone){
          badges='<span class="badge bg-green">✅완료</span>';
        } else {
          if(totalPan>0) badges+='<span class="badge '+(scannedPan>0?'bg-yellow':'')+'" style="margin-right:.2rem;">'+scannedPan+'/'+totalPan+'판</span>';

        }
        return '<div style="display:flex;align-items:center;padding:.35rem 0;border-bottom:1px solid #f0f0f0;">'+
          '<span style="flex:1">'+n+'</span>'+
          '<span class="badge '+(allDone?'bg-green':'bg-yellow')+'" style="margin-right:.3rem;">'+doneKinds+'/'+totalKinds+'종</span>'+
          badges+
          '</div>';
      }).join(''))+
    '</div></div>';

async function applyTodayTmpl() {
  var wday=['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
  var tmpl=S.templates[wday]; if(!tmpl) return;
  var d=S.ordDate; if(!S.orders[d]) S.orders[d]={};
  var newEntries={};
  Object.keys(tmpl).forEach(function(n){
    if(!S.orders[d][n]){
      S.orders[d][n]={items:(tmpl[n]||[]).map(function(pid){return {pid:pid,qty:1,done:false};})};
      newEntries[n]=S.orders[d][n];
    }
  });
  if(!Object.keys(newEntries).length){ toast('이미 모두 추가되어 있어요','ok'); return; }
  await db.collection('orders').doc(d).set(newEntries, {merge:true});
  toast('템플릿 불러오기 완료!','ok'); go('orders');
}

}

function pgOutbound() {
  var todayOrd=S.orders[S.ordDate]||{};
  if(!S.outDriver) S.outDriver='전체';
  
  // Filter client names by driver
  // orders.driver 우선, 없으면 clients.driver (출고지시서 화면과 동일 기준)
  var names=Object.keys(todayOrd).filter(function(n){
    var hasItems=((todayOrd[n]||{}).items||[]).length>0;
    if(!hasItems) return false;
    if(S.outDriver==='전체') return true;
    var orderDriver = (todayOrd[n]||{}).driver;
    if(orderDriver) return orderDriver===S.outDriver;

  }).sort(function(a,b){return a.localeCompare(b,'ko');});  // 가나다순 고정

  return '<div class="card">'+
    '<div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem;">'+

    '<div class="card-title">기사 선택</div>'+
    '<div class="driver-tabs">'+

      DRIVERS.map(function(d){return '<div class="dtab'+(S.outDriver===d?' active':'')+'" onclick="S.outDriver=\''+d+'\';S.outClient=null;go(\'outbound\');">'+d+'</div>';}).join('')+

    '<div class="card-title" style="margin-top:.5rem;">거래처 선택</div>'+

      (names.length?names.map(function(n){
        var cliOrd=(S.orders[S.ordDate]||{})[n];
        var cliItems=(cliOrd&&cliOrd.items)||[];

        var xColor=sel?'color:#fff;border-left:1px solid rgba(255,255,255,.3);':done?'color:#27ae60;border-left:1px solid #a0d9b4;':'color:#e74c3c;border-left:1px solid #ddd;';
        var chk=done&&!sel?'<span style="font-size:.75rem;padding:.2rem .3rem">✅</span>':'';
        var en=esc(n);
        var html='<div style="display:inline-flex;align-items:center;'+wrapBg+';border-radius:4px;margin:.15rem;">'+chk;
        html+='<button style="background:none;border:none;cursor:pointer;padding:.35rem .7rem;font-size:.78rem;'+btnColor+'" onclick="selObClient(\''+ en +'\')">'+n+'</button>';

        '<p style="color:#aaa;font-size:.85rem;">이 기사의 오늘 출고지시서가 없습니다.</p>')+

      '<input id="ob-scan" type="text" class="scan-input" placeholder="🔍 QR 스캔 후 Enter" onkeydown="if(event.key===\'Enter\')doScanOut()" oninput="obScanTimer()">'+
      '<div id="ob-result" style="min-height:1.5rem;"></div>'+
      '<div id="ob-items">'+drawObItems()+'</div></div>':'');
}

function drawObItems() {
  if(!S.outClient) return '';
  var order=(S.orders[S.ordDate]||{})[S.outClient]; if(!order||!order.items||!order.items.length) return '<p style="color:#aaa;">품목 없음</p>';
  var totalPanQty=0, totalPanRemaining=0;
  var totalBongQty=0, totalBongRemaining=0;
  var totalGeaQty=0, totalGeaRemaining=0;
  // 단위는 제품 unit 필드 사용

  var rows=order.items.map(function(item,i){
    var p=S.prods.find(function(x){return x.id===item.pid;});
    var scanned=item.scanned||0;
    var remaining=item.qty-scanned;
    var complete=scanned>=item.qty;
    var pname=p?p.name:item.pid;
    var unit=p&&p.unit?p.unit:'판';
    var numColor=remaining===0?'#27ae60':'#333';
    var statusBadge=complete?'<span class="badge bg-green">✅완료</span>':scanned>0?'<span class="badge bg-yellow">스캔중 '+scanned+'/'+item.qty+'</span>':'<span class="badge">대기</span>';
    if(unit==='판'){totalPanQty+=item.qty; totalPanRemaining+=remaining;}
    else if(unit==='봉'){totalBongQty+=item.qty; totalBongRemaining+=remaining;}
    else if(unit==='개'){totalGeaQty+=item.qty; totalGeaRemaining+=remaining;}
    var unitColor=unit==='봉'?'color:#9b59b6;':unit==='개'?'color:#e67e22;':unit==='박스'?'color:#2980b9;':'color:#333;';
    return '<tr style="'+(complete?'background:#f0fff4;':unit==='봉'?'background:#fdf6ff;':unit==='개'?'background:#fff8f0;':unit==='박스'?'background:#f0f8ff;':'')+'">'+
      '<td>'+pname+'</td>'+
      '<td><span style="font-weight:600;'+unitColor+'">'+item.qty+unit+'</span></td>'+
      '<td><span style="font-size:1.2rem;font-weight:bold;color:'+numColor+';">'+remaining+'</span></td>'+
      '<td>'+statusBadge+'</td>'+
      '<td>'+(scanned>0?'<button class="btn btn-gray btn-sm" onclick="undoOb(\''+item.pid+'\')">↩️</button>':'')+'</td></tr>';
  }).join('');
  var panColor=totalPanRemaining===0?'#27ae60':'#2563eb';
  var bongColor=totalBongRemaining===0?'#27ae60':'#333';
  var geaColor=totalGeaRemaining===0?'#27ae60':'#333';
  var tfoot='<tr style="background:#f0f4ff;font-weight:bold;">'+
    '<td>합계(판)</td><td>'+totalPanQty+'판</td>'+
    '<td><span style="font-size:1.1rem;font-weight:bold;color:'+panColor+';">'+totalPanRemaining+'</span></td>'+
    '<td colspan="2"></td></tr>';
  if(totalBongQty>0) tfoot+='<tr style="background:#fff8ee;font-weight:bold;">'+
    '<td>합계(봉)</td><td>'+totalBongQty+'봉</td>'+
    '<td><span style="font-size:1.1rem;font-weight:bold;color:'+bongColor+';">'+totalBongRemaining+'</span></td>'+
    '<td colspan="2"></td></tr>';
  if(totalGeaQty>0) tfoot+='<tr style="background:#f5f5ff;font-weight:bold;">'+
    '<td>합계(개)</td><td>'+totalGeaQty+'개</td>'+
    '<td><span style="font-size:1.1rem;font-weight:bold;color:'+geaColor+';">'+totalGeaRemaining+'</span></td>'+
    '<td colspan="2"></td></tr>';
  return '<table><thead><tr><th>제품명</th><th>출고수량</th><th>남은수량</th><th>상태</th><th></th></tr></thead><tbody>'+rows+
    '</tbody><tfoot>'+tfoot+'</tfoot></table>';
}

function afterOutbound() {
  if(S.outClient) setTimeout(function(){ var el=document.getElementById('ob-scan'); if(el) el.focus(); },80);
}

function filterObClients() {
  var q=(document.getElementById('ob-q')||{value:''}).value.toLowerCase().trim();
  var todayOrd=S.orders[S.ordDate]||{};
  var names=Object.keys(todayOrd).filter(function(n){
    var orderDriver=(todayOrd[n]||{}).driver;
    var cl=S.clients.find(function(c){return c.name===n;});
    var effectiveDrv=orderDriver||(cl?cl.driver:'');
    var drvOk=S.outDriver==='전체'||effectiveDrv===S.outDriver;
    if(!drvOk) return false;
    if(!q) return true;
    if(n.toLowerCase().indexOf(q)>=0) return true;
    if(cl&&cl.code&&cl.code===q) return true;
    return false;
  });
  var el=document.getElementById('ob-clients'); if(!el) return;
  el.innerHTML=names.map(function(n){
    var cl=S.clients.find(function(c){return c.name===n;});
    var lbl=cl&&cl.code?'<span style="font-size:.65rem;color:rgba(255,255,255,.6);margin-left:.2rem;">('+cl.code+')</span>':'';
    return '<button class="client-btn'+(S.outClient===n?' sel':'')+'" onclick="selObClient(\''+esc(n)+'\')">'+n+lbl+'</button>';
  }).join('');
}

function selObClient(name){ S.outClient=name; go('outbound'); }

async function removeObClient(name) {
  delete (S.orders[S.ordDate]||{})[name];
  if(S.outClient===name) S.outClient=null;
  try {
    await db.collection('orders').doc(S.ordDate).set({[name]: firebase.firestore.FieldValue.delete()}, {merge:true});
    go('outbound'); toast(name+' 제거됨','ok');
  }
  catch(e){toast('오류:'+e.message,'err');}
}

async function doScanOut() {
  var scanEl=document.getElementById('ob-scan'), resEl=document.getElementById('ob-result');
  if(!scanEl||!S.outClient) return;
  var qr=scanEl.value.trim(); scanEl.value=''; scanEl.focus(); if(!qr) return;
  var p=findByQR(qr);
  if(!p){resEl.innerHTML='<div class="res-err">❌ 코드 없음: '+qr+'</div>';return;}
  var curQ=S.inv[p.id]||0;
  if(curQ<=0){resEl.innerHTML='<div class="res-err">⚠️ <strong>'+p.name+'</strong> 재고 없음!</div>';return;}
  var d=S.ordDate; if(!S.orders[d]) S.orders[d]={};
  if(!S.orders[d][S.outClient]) S.orders[d][S.outClient]={items:[]};
  var items=S.orders[d][S.outClient].items;
  var idx=items.findIndex(function(i){return i.pid===p.id;});
  if(idx>=0){
    var item=items[idx];
    var scanned=(item.scanned||0)+1;
    if(scanned>item.qty){
      resEl.innerHTML='<div class="res-err">⛔ <strong>'+p.name+'</strong> 이미 완료! ('+item.qty+'개 다 스캔됨)</div>';
      return;
    }
    item.scanned=scanned;
    item.done=scanned>=item.qty;
  } else {
    items.push({pid:p.id,qty:1,scanned:1,done:true});
  }
  var newQ=curQ-1; S.inv[p.id]=newQ;
  await safeWrite(async function() {
    await db.collection('inventory').doc(p.id).set({qty:newQ});
    await db.collection('orders').doc(d).set({[S.outClient]: S.orders[d][S.outClient]}, {merge:true});
    await db.collection('logs').add({type:'outbound',pid:p.id,pname:p.name,client:S.outClient,qty:1,ts:firebase.firestore.FieldValue.serverTimestamp()});
    resEl.innerHTML='<div class="res-ok">✅ <strong>'+p.name+'</strong> 출고! 남은재고: '+newQ+'</div>';
    var el=document.getElementById('ob-items'); if(el) el.innerHTML=drawObItems();
  });
}

async function undoOb(pid) {
  // pid 기준으로 취소 (인덱스는 동시 수정 시 어긋날 수 있음)
  if(!S.outClient) return;
  var items=((S.orders[S.ordDate]||{})[S.outClient]||{}).items; if(!items) return;
  var item=items.find(function(i){return i.pid===pid;}); if(!item) return;
  if((item.scanned||0)<=0) return;
  item.scanned=(item.scanned||1)-1;
  item.done=item.scanned>=item.qty;
  S.inv[item.pid]=(S.inv[item.pid]||0)+1;
  await safeWrite(async function() {
    await db.collection('inventory').doc(item.pid).set({qty:S.inv[item.pid]});
    await db.collection('orders').doc(S.ordDate).set({[S.outClient]: S.orders[S.ordDate][S.outClient]}, {merge:true});
    toast('1개 취소됨','ok'); var el=document.getElementById('ob-items'); if(el) el.innerHTML=drawObItems();
  });
}

function drawOrdCard(name, data) {
  var items=(data||{}).items||[], cl=S.clients.find(function(c){return c.name===name;}), sid=safeid(name);

    '<div id="psres_'+sid+'" style="margin-bottom:.5rem;"></div>'+
    (items.length?'<table style="font-size:.82rem;"><thead><tr><th style="width:30px;">#</th><th>제품명</th><th>수량</th><th></th>'+ (!locked?'<th style="width:28px;"></th>':'')+  '</tr></thead><tbody id="dtbody_'+sid+'" ondragover="ordDragOver(event)" ondrop="ordDrop(event,\''+en+'\')">'+
      items.map(function(item,i){
        var p=S.prods.find(function(x){return x.id===item.pid;});

      }).join('')+'</tbody></table>':'<p style="color:#aaa;font-size:.83rem;">품목을 검색해서 추가하세요</p>')+
  '</div>';
}


// ── 출고지시서 아이템 드래그 순서 변경 ──
var _dragPid = null;
var _dragClient = null;

function ordDragStart(e) {
  _dragPid = e.currentTarget.dataset.pid;
  _dragClient = e.currentTarget.dataset.client;
  e.currentTarget.style.opacity = '0.4';
  e.dataTransfer.effectAllowed = 'move';
}

function ordDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var tr = e.target.closest('tr');
  if (!tr) return;
  var tbody = tr.parentNode;
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.forEach(function(r){ r.style.borderTop = ''; });
  tr.style.borderTop = '2px solid #2d7dd2';
}

function ordDrop(e, clientName) {
  e.preventDefault();
  var tbody = e.currentTarget;
  var rows = Array.from(tbody.querySelectorAll('tr'));
  rows.forEach(function(r){ r.style.borderTop = ''; r.style.opacity = '1'; });

  var targetTr = e.target.closest('tr');
  if (!targetTr || !_dragPid) return;

  var targetPid = targetTr.dataset.pid;
  if (targetPid === _dragPid) return;

  // 실제 이름 디코딩
  var realClient = clientName.replace(/&#39;/g,"'").replace(/&amp;/g,'&');
  var d = S.ordDate;
  var items = ((S.orders[d]||{})[realClient]||{}).items;
  if (!items) return;

  var fromIdx = items.findIndex(function(i){ return i.pid === _dragPid; });
  var toIdx   = items.findIndex(function(i){ return i.pid === targetPid; });
  if (fromIdx < 0 || toIdx < 0) return;

  var moved = items.splice(fromIdx, 1)[0];
  items.splice(toIdx, 0, moved);

  db.collection('orders').doc(d).set({[realClient]: S.orders[d][realClient]}, {merge:true})
    .then(function(){ toast('순서 변경됨','ok'); })
    .catch(function(err){ toast('오류: '+err.message,'err'); });

  var sid = safeid(realClient);
  var el = document.getElementById('ocard_'+sid);
  if (el) { var tmp=document.createElement('div'); tmp.innerHTML=drawOrdCard(realClient,S.orders[d][realClient]); el.parentNode.replaceChild(tmp.firstChild,el); }

  _dragPid = null; _dragClient = null;
}

}

async function chgQty(clientName, pid, delta) {
  // pid 기준으로 수량 변경 (인덱스는 동시 수정 시 어긋날 수 있음)
  var data=(S.orders[S.ordDate]||{})[clientName]; if(!data||!data.items) return;

    await db.collection('orders').doc(S.ordDate).set({[clientName]: data}, {merge:true});
    var el=document.getElementById('ocard_'+sid); if(el){var tmp=document.createElement('div');tmp.innerHTML=drawOrdCard(clientName,data);el.parentNode.replaceChild(tmp.firstChild,el);}
  });
}

async function rmItem(clientName, pid) {
  // pid 기준으로 삭제 (인덱스는 동시 수정 시 어긋날 수 있어서 사용 안 함)
  var data=(S.orders[S.ordDate]||{})[clientName]; if(!data||!data.items) return;

async function syncClientDays() {
  var batch = db.batch();
  var changed = 0;
  S.clients.forEach(function(c) {
    var def = CLIENTS_DEFAULT.find(function(d){ return d.name===c.name; });
    if(def && def.day && c.day !== def.day) {
      c.day = def.day;
      batch.update(db.collection('clients').doc(c.id), {day: def.day});
      changed++;
    }
  });
  if(changed > 0) {
    try { await batch.commit(); console.log('요일 동기화: '+changed+'개'); }
    catch(e) { console.log('동기화 오류:', e); }
  }
}

async function autoAddByDay() {
  var DAYS_KO = ['일','월','화','수','목','금','토'];
  var date = new Date(S.ordDate);
  var dayName = DAYS_KO[date.getDay()];
  // 해당 요일 거래처 찾기
  var dayClients = S.clients.filter(function(c){ return c.day === dayName; });
  if(!dayClients.length) return;
  if(!S.orders[S.ordDate]) S.orders[S.ordDate] = {};
  var todayOrd = S.orders[S.ordDate];
  var toAdd = dayClients.filter(function(c){ return !todayOrd[c.name]; });
  if(!toAdd.length) return;
  var newEntries = {};
  toAdd.forEach(function(c){
    todayOrd[c.name] = {items:[], driver: c.driver||''};
    newEntries[c.name] = {items:[], driver: c.driver||''};
  });
  try {
    await db.collection('orders').doc(S.ordDate).set(newEntries, {merge:true});
    toast(dayName+'요일 거래처 '+toAdd.length+'개 자동 추가됨','ok');
  } catch(e){ toast('오류: '+e.message,'err'); }
}

async function toggleLock(name) {
  var todayOrd = S.orders[S.ordDate] || {};
  var data = todayOrd[name]; if(!data) return;
  var locked = !data.locked;
  // 잠글 때 origQty 저장
  if(locked && data.items) {
    data.items = data.items.map(function(item){
      return Object.assign({}, item, {origQty: item.qty});
    });
  }
  data.locked = locked;
  try {
    await db.collection('orders').doc(S.ordDate).set({[name]: data}, {merge: true});
    if(!S.orders[S.ordDate]) S.orders[S.ordDate] = {};
    S.orders[S.ordDate][name] = data;
    toast(locked ? name+' 입력완료 잠김 🔒' : name+' 수정 가능 🔓', 'ok');
    render();
  } catch(e){ toast('오류: '+e.message, 'err'); }
}

async function toggleOrdClient(name) {
  var d=S.ordDate; if(!S.orders[d]) S.orders[d]={};
  if(S.orders[d][name]){
    if(!confirm(name+' 제거할까요?')) return;
    delete S.orders[d][name];
    try {
      await db.collection('orders').doc(d).set({[name]: firebase.firestore.FieldValue.delete()}, {merge:true});
      render();
    } catch(e){toast('오류:'+e.message,'err');}
  } else {
    // 현재 선택된 기사 탭으로 저장 (없으면 기존 배정 기사 사용)
    var assignedDriver = S.ordDriver !== '전체' ? S.ordDriver : '';
    if(!assignedDriver) {
      var cl=S.clients.find(function(c){return c.name===name;});
      assignedDriver = cl ? cl.driver : '';
    }
    S.orders[d][name]={items:[], driver: assignedDriver};
    // 기사 탭이 선택된 경우 미배정 거래처면 자동 배정
    if(S.ordDriver!=='전체'){
      var cl2=S.clients.find(function(c){return c.name===name;});
      if(cl2 && !cl2.driver){
        cl2.driver=S.ordDriver;
        try{ await db.collection('clients').doc(cl2.id).update({driver:S.ordDriver}); }catch(e){}
      }
    }
    try {
      await db.collection('orders').doc(d).set({[name]: S.orders[d][name]}, {merge:true});
      render();
    } catch(e){toast('오류:'+e.message,'err');}
  }
}

async function exportExcel() {
  var todayOrd = S.orders[S.ordDate] || {};
  if(!Object.keys(todayOrd).length){ toast('출고지시서가 없어요','err'); return; }

  var rows = [['날짜','기사','거래처','품목','수량']];
  DRIVERS.concat(['미배정']).forEach(function(drv){
    Object.keys(todayOrd).forEach(function(name){
      var data = todayOrd[name];
      var orderDrv = data.driver || '';
      var cl = S.clients.find(function(c){return c.name===name;});
      var clientDrv = cl ? cl.driver : '';
      var effectiveDrv = orderDrv || clientDrv || '미배정';
      if(effectiveDrv !== drv) return;
      var items = (data.items||[]);
      if(!items.length){
        rows.push([S.ordDate, drv, name, '', '']);
      } else {
        items.forEach(function(item){
          var p = S.prods.find(function(x){return x.id===item.pid;});
          rows.push([S.ordDate, drv, name, p?p.name:item.pid, item.qty]);
        });
      }
    });
  });

  var csv = rows.map(function(r){
    return r.map(function(c){return '"'+(c||'').toString().replace(/"/g,'""')+'"';}).join(',');
  }).join('\n');

  var bom = '\uFEFF';
  var blob = new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '출고지시서_'+S.ordDate+'.csv';
  a.click();
  toast('엑셀 다운로드 완료!','ok');
}

      if(items.length){

        var left = items.slice(0, half);

        html += '<table><thead><tr><th>품목</th><th>수량</th><th>품목</th><th>수량</th></tr></thead><tbody>';

      } else {
        html += '<div style="color:#aaa;font-size:10px;padding:2px;">품목 없음</div>';
      }
      html += '</div>';
    });

  });

  html += '</body></html>';

  var w = window.open('','_blank','width=900,height=900');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 500);

async function addDriver() {
  var el = document.getElementById('drv-input'); if(!el) return;
  var name = el.value.trim();
  if(!name){toast('기사 이름을 입력해주세요','err');return;}
  if(DRIVERS.indexOf(name)>=0){toast('이미 있는 기사예요','err');return;}

async function showProdHistory(pid, pname) {
  openModal('📋 '+pname+' 입고 내역', '<div style="text-align:center;color:#aaa;padding:1rem;">로딩 중...</div>');
  try {
    var snap = await db.collection('logs').where('pid','==',pid).get();
    var dayMap = {};
    snap.forEach(function(d){
      var data = d.data();
      if(data.type !== 'inbound') return;
      var t = data.ts && data.ts.toDate ? data.ts.toDate() : null;
      var dateStr = t ? (t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-'+t.getDate().toString().padStart(2,'0')) : '날짜없음';
      if(!dayMap[dateStr]) dayMap[dateStr] = 0;
      dayMap[dateStr] += (data.qty||1);
    });

    var dates = Object.keys(dayMap).sort(function(a,b){return b.localeCompare(a);});

    if(!dates.length){
      document.getElementById('modal-body').innerHTML = '<p style="color:#aaa;text-align:center;padding:1rem;">입고 내역이 없어요.</p>';
      return;
    }

    var total = dates.reduce(function(s,d){return s+dayMap[d];},0);
    var html = '<div style="margin-bottom:.75rem;padding:.5rem;background:#f0f4ff;border-radius:4px;font-weight:bold;">누적 총 입고: '+total+'개</div>';
    html += '<table><thead><tr><th>날짜</th><th>입고 수량</th></tr></thead><tbody>';
    dates.forEach(function(d){
      html += '<tr><td>'+d+'</td><td style="text-align:center;font-weight:bold;">'+dayMap[d]+'개</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('modal-body').innerHTML = html;
  } catch(e) {
    document.getElementById('modal-body').innerHTML = '<p style="color:red;">오류: '+e.message+'</p>';
  }
}

async function doEditProd(pid) {
  var p=S.prods.find(function(x){return x.id===pid;}); if(!p) return;
  var name=(document.getElementById('ep-name')||{value:p.name}).value.trim();
  var cat=(document.getElementById('ep-cat')||{value:p.cat}).value;
  var qr=(document.getElementById('ep-qr')||{value:p.qr}).value.trim();
  var unit=(document.getElementById('ep-unit')||{value:'판'}).value;
  var inv=parseInt((document.getElementById('ep-inv')||{value:0}).value)||0;
  var oldInv=S.inv[p.id]||0;
  p.name=name; p.cat=cat; p.qr=qr; p.unit=unit; S.inv[p.id]=inv;
  try {
    await db.collection('products').doc(p.id).update({name:name,cat:cat,qr:qr,unit:unit});
    await db.collection('inventory').doc(p.id).set({qty:inv});
    // 재고가 바뀌었으면 로그 기록
    if(inv !== oldInv) {
      var diff = inv - oldInv;
      await db.collection('logs').add({
        type: diff > 0 ? 'inbound' : 'outbound',
        pid: p.id,
        pname: name,
        qty: Math.abs(diff),
        memo: '수정으로 재고 변경 ('+oldInv+'→'+inv+')',
        ts: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    closeModal(); toast(name+' 수정됨','ok'); drawProducts();
  } catch(e){toast('오류:'+e.message,'err');}
}

    '</div>'+

async function loadLogs() {
  var el=document.getElementById('logs-content'); if(!el) return;
  var filterDate=(document.getElementById('log-date')||{}).value||'';
  try {
    var snap=await db.collection('logs').where('type','==','inbound').get();

    // 날짜+제품별 합산
    var dayProd = {}; // 'YYYY-MM-DD' -> { productName: qty }
    var dayDocIds = {}; // 'YYYY-MM-DD' -> [docId, ...]
    snap.forEach(function(d){
      var r=d.data();
      var t=r.ts&&r.ts.toDate?r.ts.toDate():null;
      if(!t) return;
      var dateStr=t.getFullYear()+'-'+(t.getMonth()+1).toString().padStart(2,'0')+'-'+t.getDate().toString().padStart(2,'0');
      if(filterDate && dateStr!==filterDate) return;
      if(!dayProd[dateStr]) dayProd[dateStr]={};
      if(!dayDocIds[dateStr]) dayDocIds[dateStr]=[];
      dayDocIds[dateStr].push(d.id);
      var pname=r.pname||r.pid||'-';
      if(!dayProd[dateStr][pname]) dayProd[dateStr][pname]=0;
      dayProd[dateStr][pname]+=(r.qty||1);
    });

    var dates=Object.keys(dayProd).sort(function(a,b){return b.localeCompare(a);});
    if(!dates.length){el.innerHTML='<p style="color:#aaa;">해당 날짜 입고 기록 없음</p>';return;}

    var html='';
    dates.forEach(function(date){
      var prods=dayProd[date];
      var docIds=dayDocIds[date]||[];
      var total=Object.values(prods).reduce(function(a,b){return a+b;},0);
      html+='<div style="margin-bottom:1rem;">'+
        '<div style="background:#1e3a5f;color:#fff;padding:.4rem .8rem;border-radius:4px 4px 0 0;font-weight:bold;display:flex;justify-content:space-between;align-items:center;">'+
          '<span>📅 '+date+'</span>'+
          '<div style="display:flex;align-items:center;gap:.5rem;">'+
            '<span>총 '+total+'개</span>'+
            '<button onclick="changeLogDate(\''+date+'\','+JSON.stringify(docIds)+')" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:.2rem .5rem;border-radius:4px;cursor:pointer;font-size:.75rem;">날짜수정</button>'+
          '</div>'+
        '</div>'+
        '<table style="border-radius:0 0 4px 4px;overflow:hidden;">'+
        '<thead><tr><th>제품명</th><th style="text-align:center;width:80px;">입고 수량</th></tr></thead><tbody>'+
        Object.keys(prods).sort().map(function(pname){
          return '<tr><td>'+pname+'</td><td style="text-align:center;font-weight:bold;color:#27ae60;">+'+prods[pname]+'</td></tr>';
        }).join('')+
        '</tbody></table></div>';
    });
    el.innerHTML=html;
  } catch(e){el.innerHTML='<p style="color:red;">오류: '+e.message+'</p>';}
}

async function changeLogDate(oldDate, docIds) {
  var newDate = prompt('새 날짜를 입력하세요 (예: 2026-05-29)', oldDate);
  if(!newDate || newDate===oldDate) return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(newDate)){alert('날짜 형식이 올바르지 않아요. 예: 2026-05-29');return;}
  if(!confirm(oldDate+' → '+newDate+' 로 변경할까요?\n총 '+docIds.length+'개 기록이 변경돼요.')) return;
  try {
    var newTs = new Date(newDate+'T12:00:00');
    var batch = db.batch();
    docIds.forEach(function(id){
      batch.update(db.collection('logs').doc(id), {ts: firebase.firestore.Timestamp.fromDate(newTs)});
    });
    await batch.commit();
    alert('날짜 변경 완료!');
    loadLogs();
  } catch(e){alert('오류: '+e.message);}
}

    if(data.prods){S.prods=data.prods;var b=db.batch();S.prods.forEach(function(p){b.set(db.collection('products').doc(p.id),{qr:p.qr,name:p.name,cat:p.cat});});await b.commit();}
    if(data.clients){S.clients=data.clients;var b2=db.batch();S.clients.forEach(function(c){b2.set(db.collection('clients').doc(c.id),{name:c.name,driver:c.driver||''});});await b2.commit();}
    if(data.inv){S.inv=data.inv;var b3=db.batch();Object.keys(data.inv).forEach(function(id){b3.set(db.collection('inventory').doc(id),{qty:data.inv[id]});});await b3.commit();}
    if(data.orders){S.orders=data.orders;var b4=db.batch();Object.keys(data.orders).forEach(function(d){b4.set(db.collection('orders').doc(d),data.orders[d]);});await b4.commit();}
    if(data.templates){S.templates=data.templates;var b5=db.batch();Object.keys(data.templates).forEach(function(k){b5.set(db.collection('templates').doc(k),data.templates[k]);});await b5.commit();}
    toast('복원 완료!','ok'); go('dashboard');
  } catch(e){toast('복원 오류: '+e.message,'err');}
}

  _ibTimer=setTimeout(function(){
    var el=document.getElementById('ib-scan');
    if(el&&el.value.trim()) doScanIn();
  },500);
}
var _obTimer=null;
function obScanTimer(){
  clearTimeout(_obTimer);
  _obTimer=setTimeout(function(){
    var el=document.getElementById('ob-scan');
    if(el&&el.value.trim()) doScanOut();
  },500);
}

// 스캐너 전용: input 포커스 유지하면서 값 변화 감지
var _ibPollTimer=null;
var _ibLastVal='';
function startIbPoll(){
  clearInterval(_ibPollTimer);
  _ibLastVal='';
  _ibPollTimer=setInterval(function(){
    var el=document.getElementById('ib-scan');
    if(!el) return;
    var v=el.value.trim();
    if(v && v===_ibLastVal){
      clearInterval(_ibPollTimer);
      _ibLastVal='';
      doScanIn();
    } else {
      _ibLastVal=v;
    }
  },150);
}

// ── HELPERS ──────────────────────────────────────────────────
function findByQR(qr){return S.prods.find(function(p){return p.qr===qr||p.id===qr;});}
function uniqueCats(){return[...new Set(S.prods.map(function(p){return p.cat;}))];}
function safeid(s){var r='';for(var i=0;i<(s||'').length;i++)r+=s.charCodeAt(i).toString(36);return 'n'+r;}
function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function toast(msg,type){
  var c=document.getElementById('toast'), d=document.createElement('div');
  d.className='ti '+(type==='ok'?'ti-ok':type==='err'?'ti-err':'');
  d.textContent=msg; c.appendChild(d);
  setTimeout(function(){d.remove();},3000);
}
